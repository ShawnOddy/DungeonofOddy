<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Engine - Advanced Procedural Edition</title>
    <style>
        /* --- MODERN SLATE & DARK FANTASY PALETTE --- */
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            user-select: none;
        }

        /* Modernized Frame Window Shell */
        .win-application {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.7);
            padding: 6px;
            width: 524px;
            position: relative;
        }

        /* Sleek Title Header */
        .win-titlebar {
            background-color: #020617;
            color: #38bdf8;
            font-weight: 600;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            border-radius: 6px 6px 0 0;
            letter-spacing: 0.5px;
        }
        
        .win-title-buttons {
            display: flex;
            gap: 6px;
        }
        .win-btn-small {
            background-color: #334155;
            border: none;
            color: #94a3b8;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Menu Bar */
        .win-menubar {
            display: flex;
            gap: 16px;
            padding: 8px 12px;
            background-color: #1e293b;
            border-bottom: 1px solid #334155;
            font-size: 13px;
            color: #94a3b8;
        }
        .win-menu-item {
            cursor: pointer;
            transition: color 0.15s;
        }
        .win-menu-item:hover {
            color: #38bdf8;
        }

        /* Action Toolbar Ribbon */
        .win-toolbar {
            display: flex;
            gap: 6px;
            padding: 8px;
            background-color: #020617;
            border-bottom: 1px solid #334155;
            align-items: center;
        }

        .win-button {
            background-color: #1e293b;
            border: 1px solid #475569;
            border-radius: 4px;
            color: #f8fafc;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .win-button:hover:not(:disabled) {
            background-color: #38bdf8;
            border-color: #38bdf8;
            color: #020617;
        }
        
        #btn-rest {
            border-color: #10b981;
            color: #10b981;
        }
        #btn-rest:hover {
            background-color: #10b981;
            color: #020617;
        }

        /* Canvas Viewport */
        .canvas-container {
            border-bottom: 1px solid #334155;
            background-color: #020617;
            overflow: hidden;
            width: 512px;
            height: 384px;
            margin: 0 auto;
        }
        canvas {
            display: block;
        }

        /* --- TWO PANEL BASEBOARD SPLIT --- */
        .win-bottom-pane {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }

        /* Modernized Terminal Log */
        .win-log-box {
            flex: 1.4;
            background-color: #020617;
            color: #cbd5e1;
            border: 1px solid #334155;
            border-radius: 4px;
            height: 125px;
            overflow-y: auto;
            padding: 8px;
            box-sizing: border-box;
            font-family: 'Consolas', monospace;
            font-size: 12px;
        }
        .log-entry {
            margin-bottom: 4px;
            border-left: 2px solid #475569;
            padding-left: 6px;
            line-height: 1.4;
        }
        .log-important { border-left-color: #f43f5e; color: #fda4af; }
        .log-success { border-left-color: #10b981; color: #a7f3d0; }

        /* Status Pane */
        .win-status-box {
            flex: 0.8;
            background-color: #020617;
            color: #f8fafc;
            border: 1px solid #334155;
            border-radius: 4px;
            height: 125px;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            align-items: center;
        }
        .status-lbl { color: #94a3b8; font-weight: 500; }
        .status-val { font-weight: 600; font-family: monospace; font-size: 13px; }

        .hint-text {
            font-size: 12px;
            color: #64748b;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="win-application">
        <div class="win-titlebar">
            <span>Dungeon Engine v2.5 - Vector Graphic Build</span>
            <div class="win-title-buttons">
                <button class="win-btn-small">_</button>
                <button class="win-btn-small">X</button>
            </div>
        </div>

        <div class="win-menubar">
            <span class="win-menu-item" onclick="appendLog('Inventory system active.')">Inventory</span>
            <span class="win-menu-item" onclick="appendLog('STR: 14 | DEX: 12 | CON: 15 | INT: 10')">Stats</span>
            <span class="win-menu-item" onclick="regenerateFloor()">Regen Floor</span>
        </div>

        <div class="win-toolbar">
            <button class="win-button" onclick="triggerAction('rest')">Pass Turn</button>
            <button class="win-button" id="btn-rest" onclick="triggerAction('r')">Rest Until Healed</button>
            <button class="win-button" onclick="triggerAction('f')">Mana Blast (3MP)</button>
            <button class="win-button" onclick="triggerAction('stairs')">Descend Stairs</button>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas" width="512" height="384"></canvas>
        </div>

        <div class="win-bottom-pane">
            <div class="win-log-box" id="log">
                <div class="log-entry">Dungeon initialized with advanced vector styling features.</div>
            </div>

            <div class="win-status-box">
                <div class="status-row"><span class="status-lbl">HP:</span><span class="status-val" id="ui-hp" style="color: #f43f5e;">0/0</span></div>
                <div class="status-row"><span class="status-lbl">Mana:</span><span class="status-val" id="ui-mp" style="color: #38bdf8;">0/0</span></div>
                <div class="status-row"><span class="status-lbl">Floor:</span><span class="status-val" id="ui-level" style="color: #e2e8f0;">1</span></div>
                <div class="status-row"><span class="status-lbl">Gold:</span><span class="status-val" id="ui-gold" style="color: #eab308;">0</span></div>
                <div class="status-row"><span class="status-lbl">XP:</span><span class="status-val" id="ui-xp" style="color: #10b981;">1 (0/20)</span></div>
            </div>
        </div>
    </div>

    <div class="hint-text">
        Move: <b>WASD / Arrow Keys</b>. Automated recovery setup: <b>R Key</b>. Descend Stairs: <b>Enter / Stairs Button</b>.
    </div>

<script>
// --- CONFIGURATION ENGINE ---
const GAME_TILE = 32; 
const MAP_WIDTH = 30; const MAP_HEIGHT = 30;
const VIEW_WIDTH = 16; const VIEW_HEIGHT = 12;

const TILE = { WALL: 0, FLOOR: 1, STAIRS_DOWN: 2 };

let playerState = {
    stats: { str: 14, dex: 12, con: 15, int: 10 },
    hp: 15, maxHp: 40, mp: 5, maxMp: 25, gold: 150,
    dungeonFloor: 1, charLevel: 1, xp: 0, maxXp: 20
};

let gameMap = []; let enemies = []; let floatTexts = [];
let playerPos = { x: 0, y: 0 }; let camX = 0; let camY = 0;
let isResting = false; let restInterval = null;

function appendLog(msg, type = '') {
    const logBox = document.getElementById('log');
    let classStr = type ? ` class="${type}"` : '';
    logBox.innerHTML += `<div class="log-entry"${classStr}>${msg}</div>`;
    logBox.scrollTop = logBox.scrollHeight;
}

function updateUI() {
    document.getElementById('ui-hp').innerText = `${playerState.hp}/${playerState.maxHp}`;
    document.getElementById('ui-mp').innerText = `${playerState.mp}/${playerState.maxMp}`;
    document.getElementById('ui-level').innerText = playerState.dungeonFloor;
    document.getElementById('ui-gold').innerText = playerState.gold;
    document.getElementById('ui-xp').innerText = `${playerState.charLevel} (${playerState.xp}/${playerState.maxXp})`;
}

function updateCamera() {
    camX = Math.max(0, Math.min(playerPos.x - Math.floor(VIEW_WIDTH / 2), MAP_WIDTH - VIEW_WIDTH));
    camY = Math.max(0, Math.min(playerPos.y - Math.floor(VIEW_HEIGHT / 2), MAP_HEIGHT - VIEW_HEIGHT));
}

    for (let i = 0; i < roomCount; i++) {
        let w = minSize + Math.floor(Math.random() * (maxSize - minSize + 1));
        let h = minSize + Math.floor(Math.random() * (maxSize - minSize + 1));
        let x = 1 + Math.floor(Math.random() * (MAP_WIDTH - w - 2));

        let overlap = false;
        for (let r of rooms) {

        }

        if (!overlap) {

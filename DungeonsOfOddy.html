<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Engine - Advanced Procedural Edition</title>
    <style>
        /* --- MODERN SLATE & DARK FANTASY PALETTE --- */
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            user-select: none;
        }

        /* Modernized Frame Window Shell */
        .win-application {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.7);
            padding: 6px;
            width: 524px;
            position: relative;
        }

        /* Sleek Title Header */
        .win-titlebar {
            background-color: #020617;
            color: #38bdf8;
            font-weight: 600;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            border-radius: 6px 6px 0 0;
            letter-spacing: 0.5px;
        }
        
        .win-title-buttons {
            display: flex;
            gap: 6px;
        }
        .win-btn-small {
            background-color: #334155;
            border: none;
            color: #94a3b8;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Menu Bar */
        .win-menubar {
            display: flex;
            gap: 16px;
            padding: 8px 12px;
            background-color: #1e293b;
            border-bottom: 1px solid #334155;
            font-size: 13px;
            color: #94a3b8;
        }
        .win-menu-item {
            cursor: pointer;
            transition: color 0.15s;
        }
        .win-menu-item:hover {
            color: #38bdf8;
        }

        /* Action Toolbar Ribbon */
        .win-toolbar {
            display: flex;
            gap: 6px;
            padding: 8px;
            background-color: #020617;
            border-bottom: 1px solid #334155;
            align-items: center;
        }

        .win-button {
            background-color: #1e293b;
            border: 1px solid #475569;
            border-radius: 4px;
            color: #f8fafc;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .win-button:hover:not(:disabled) {
            background-color: #38bdf8;
            border-color: #38bdf8;
            color: #020617;
        }
        
        #btn-rest {
            border-color: #10b981;
            color: #10b981;
        }
        #btn-rest:hover {
            background-color: #10b981;
            color: #020617;
        }

        /* Canvas Viewport */
        .canvas-container {
            border-bottom: 1px solid #334155;
            background-color: #020617;
            overflow: hidden;
            width: 512px;
            height: 384px;
            margin: 0 auto;
        }
        canvas {
            display: block;
        }

        /* --- TWO PANEL BASEBOARD SPLIT --- */
        .win-bottom-pane {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }

        /* Modernized Terminal Log */
        .win-log-box {
            flex: 1.4;
            background-color: #020617;
            color: #cbd5e1;
            border: 1px solid #334155;
            border-radius: 4px;
            height: 125px;
            overflow-y: auto;
            padding: 8px;
            box-sizing: border-box;
            font-family: 'Consolas', monospace;
            font-size: 12px;
        }
        .log-entry {
            margin-bottom: 4px;
            border-left: 2px solid #475569;
            padding-left: 6px;
            line-height: 1.4;
        }
        .log-important { border-left-color: #f43f5e; color: #fda4af; }
        .log-success { border-left-color: #10b981; color: #a7f3d0; }

        /* Status Pane */
        .win-status-box {
            flex: 0.8;
            background-color: #020617;
            color: #f8fafc;
            border: 1px solid #334155;
            border-radius: 4px;
            height: 125px;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            align-items: center;
        }
        .status-lbl { color: #94a3b8; font-weight: 500; }
        .status-val { font-weight: 600; font-family: monospace; font-size: 13px; }

        .hint-text {
            font-size: 12px;
            color: #64748b;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="win-application">
        <div class="win-titlebar">
            <span>Dungeon Engine v2.51 - Bug-Patch Variant</span>
            <div class="win-title-buttons">
                <button class="win-btn-small">_</button>
                <button class="win-btn-small">X</button>
            </div>
        </div>

        <div class="win-menubar">
            <span class="win-menu-item" onclick="appendLog('Inventory system active.')">Inventory</span>
            <span class="win-menu-item" onclick="appendLog('STR: 14 | DEX: 12 | CON: 15 | INT: 10')">Stats</span>
            <span class="win-menu-item" onclick="regenerateFloor()">Regen Floor</span>
        </div>

        <div class="win-toolbar">
            <button class="win-button" onclick="triggerAction('rest')">Pass Turn</button>
            <button class="win-button" id="btn-rest" onclick="triggerAction('r')">Rest Until Healed</button>
            <button class="win-button" onclick="triggerAction('f')">Mana Blast (3MP)</button>
            <button class="win-button" onclick="triggerAction('stairs')">Descend Stairs</button>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas" width="512" height="384"></canvas>
        </div>

        <div class="win-bottom-pane">
            <div class="win-log-box" id="log">
                <div class="log-entry">Dungeon initialized with advanced vector styling features.</div>
            </div>

            <div class="win-status-box">
                <div class="status-row"><span class="status-lbl">HP:</span><span class="status-val" id="ui-hp" style="color: #f43f5e;">0/0</span></div>
                <div class="status-row"><span class="status-lbl">Mana:</span><span class="status-val" id="ui-mp" style="color: #38bdf8;">0/0</span></div>
                <div class="status-row"><span class="status-lbl">Floor:</span><span class="status-val" id="ui-level" style="color: #e2e8f0;">1</span></div>
                <div class="status-row"><span class="status-lbl">Gold:</span><span class="status-val" id="ui-gold" style="color: #eab308;">0</span></div>
                <div class="status-row"><span class="status-lbl">XP:</span><span class="status-val" id="ui-xp" style="color: #10b981;">1 (0/20)</span></div>
            </div>
        </div>
    </div>

    <div class="hint-text">
        Move: <b>WASD / Arrow Keys</b>. Automated recovery setup: <b>R Key</b>. Descend Stairs: <b>Enter / Stairs Button</b>.
    </div>

<script>
// --- CONFIGURATION ENGINE ---
const GAME_TILE = 32; 
const MAP_WIDTH = 30; const MAP_HEIGHT = 30;
const VIEW_WIDTH = 16; const VIEW_HEIGHT = 12;

const TILE = { WALL: 0, FLOOR: 1, STAIRS_DOWN: 2 };

let playerState = {
    stats: { str: 14, dex: 12, con: 15, int: 10 },
    hp: 15, maxHp: 40, mp: 5, maxMp: 25, gold: 150,
    dungeonFloor: 1, charLevel: 1, xp: 0, maxXp: 20
};

let gameMap = []; let enemies = []; let floatTexts = [];
let playerPos = { x: 0, y: 0 }; let camX = 0; let camY = 0;
let isResting = false; let restInterval = null;

function appendLog(msg, type = '') {
    const logBox = document.getElementById('log');
    if (!logBox) return;
    let classStr = type ? ` class="${type}"` : '';
    logBox.innerHTML += `<div class="log-entry"${classStr}>${msg}</div>`;
    logBox.scrollTop = logBox.scrollHeight;
}

function updateUI() {
    let hpEl = document.getElementById('ui-hp');
    let mpEl = document.getElementById('ui-mp');
    let lvEl = document.getElementById('ui-level');
    let gdEl = document.getElementById('ui-gold');
    let xpEl = document.getElementById('ui-xp');
    
    if(!hpEl || !mpEl || !lvEl || !gdEl || !xpEl) return; // Prevent crashes before window load completes

    hpEl.innerText = `${playerState.hp}/${playerState.maxHp}`;
    mpEl.innerText = `${playerState.mp}/${playerState.maxMp}`;
    lvEl.innerText = playerState.dungeonFloor;
    gdEl.innerText = playerState.gold;
    xpEl.innerText = `${playerState.charLevel} (${playerState.xp}/${playerState.maxXp})`;
}

function updateCamera() {
    camX = Math.max(0, Math.min(playerPos.x - Math.floor(VIEW_WIDTH / 2), MAP_WIDTH - VIEW_WIDTH));
    camY = Math.max(0, Math.min(playerPos.y - Math.floor(VIEW_HEIGHT / 2), MAP_HEIGHT - VIEW_HEIGHT));
}

// --- FULL ROOM-CONNECT PROCEDURAL DUNGEON GENERATOR ---
function generateProceduralDungeon() {
    gameMap = [];
    enemies = [];
    
    for (let y = 0; y < MAP_HEIGHT; y++) {
        let row = []; for (let x = 0; x < MAP_WIDTH; x++) row.push(TILE.WALL);
        gameMap.push(row);
    }

    let rooms = [];
    const minSize = 5, maxSize = 8, roomCount = 6;

    for (let i = 0; i < roomCount; i++) {
        let w = minSize + Math.floor(Math.random() * (maxSize - minSize + 1));
        let h = minSize + Math.floor(Math.random() * (maxSize - minSize + 1));
        let x = 1 + Math.floor(Math.random() * (MAP_WIDTH - w - 2));
        let y = 1 + Math.floor(Math.random() * (MAP_HEIGHT - h - 2));

        let overlap = false;
        for (let r of rooms) {
            if (x < r.x + r.w && x + w > r.x && y < r.y + r.h && y + h > r.y) overlap = true;
        }

        if (!overlap) {
            let newRoom = { x, y, w, h, cx: Math.floor(x + w/2), cy: Math.floor(y + h/2) };
            rooms.push(newRoom);

            for (let ry = y; ry < y + h; ry++) {
                for (let rx = x; rx < x + w; rx++) {
                    gameMap[ry][rx] = TILE.FLOOR;
                }
            }

            if (rooms.length > 1) {
                let prev = rooms[rooms.length - 2];
                // Horizontal corridor tunnels
                for (let px = Math.min(newRoom.cx, prev.cx); px <= Math.max(newRoom.cx, prev.cx); px++) {
                    gameMap[newRoom.cy][px] = TILE.FLOOR;
                }
                // Vertical corridor tunnels
                for (let py = Math.min(newRoom.cy, prev.cy); py <= Math.max(newRoom.cy, prev.cy); py++) {
                    gameMap[py][prev.cx] = TILE.FLOOR;
                }
            }
        }
    }

    if(rooms.length === 0) {
        // Safe fallback build loop if random values completely miss carving bounds
        rooms.push({x: 5, y: 5, w: 6, h: 6, cx: 8, cy: 8});
        for(let rY=5; rY<11; rY++) for(let rX=5; rX<11; rX++) gameMap[rY][rX] = TILE.FLOOR;
    }

    playerPos = { x: rooms[0].cx, y: rooms[0].cy };
    let escapeRoom = rooms[rooms.length - 1];
    gameMap[escapeRoom.cy][escapeRoom.cx] = TILE.STAIRS_DOWN;

    for (let i = 1; i < rooms.length; i++) {
        let r = rooms[i];
        if (Math.random() > 0.3) {
            enemies.push({
                x: r.cx, y: r.cy,
                name: Math.random() > 0.5 ? "Crystalline Golem" : "Shadow Fiend",
                hp: 12 + playerState.dungeonFloor * 2,
                maxHp: 12 + playerState.dungeonFloor * 2,
                atk: 3 + playerState.dungeonFloor
            });
        }
    }

    updateCamera();
    updateUI();
}

function regenerateFloor() {
    appendLog("Forced regeneration of layout...");
    generateProceduralDungeon();
}

// --- AMBUSH REST SYSTEM MECHANISM ---
function handleRestTick() {
    if (playerState.hp <= 0 || !isResting) {
        if(restInterval) clearInterval(restInterval);
        isResting = false;
        return;
    }

    // 25% Ambush processing evaluation loop
    if (Math.random() < 0.25) {
        if(restInterval) clearInterval(restInterval);
        isResting = false;

        let offsets = [{x:-1,y:0}, {x:1,y:0}, {x:0,y:-1}, {x:0,y:1}];
        for (let o of offsets) {
            let tx = playerPos.x + o.x; let ty = playerPos.y + o.y;
            if (gameMap[ty] && gameMap[ty][tx] === TILE.FLOOR) {
                enemies.push({ x: tx, y: ty, name: "Wandering Nightstalker", hp: 10, maxHp: 10, atk: 4 });
                break;
            }
        }
        appendLog("REST INTERRUPTED! A monster caught you off-guard!", "log-important");
        spawnText(playerPos.x, playerPos.y, "Ambushed!", "#f43f5e");
        processTurn();
        return;
    }

    let addedHp = Math.min(playerState.maxHp - playerState.hp, 2);
    let addedMp = Math.min(playerState.maxMp - playerState.mp, 2);
    playerState.hp += addedHp;
    playerState.mp += addedMp;

    if (addedHp > 0 || addedMp > 0) {
        appendLog(`Resting... (+${addedHp} HP, +${addedMp} Mana)`);
    }

    updateUI();

    if (playerState.hp >= playerState.maxHp && playerState.mp >= playerState.maxMp) {
        if(restInterval) clearInterval(restInterval);
        isResting = false;
        appendLog("Fully recovered to peak health.", "log-success");
    }
}

function processTurn() {
    enemies.forEach(en => {
        let distance = Math.abs(playerPos.x - en.x) + Math.abs(playerPos.y - en.y);
        if (distance === 1) {
            let defense = Math.floor(playerState.stats.con / 4);
            let netDmg = Math.max(1, en.atk - defense);
            playerState.hp -= netDmg;
            appendLog(`${en.name} attacks you for ${netDmg} dmg!`, "log-important");
            spawnText(playerPos.x, playerPos.y, `-${netDmg}`, '#ef4444');
        } else if (distance < 6) {
            let dx = Math.sign(playerPos.x - en.x);
            let dy = Math.sign(playerPos.y - en.y);
            if (gameMap[en.y][en.x + dx] === TILE.FLOOR) en.x += dx;
            else if (gameMap[en.y + dy][en.x] === TILE.FLOOR) en.y += dy;
        }
    });

    if (playerState.hp <= 0) {
        playerState.hp = 0;
        appendLog("You died! Press 'Regen Floor' to try again.", "log-important");
    }
    updateCamera();
    updateUI();
}

function spawnText(x, y, text, color) { floatTexts.push({ x, y, text, color, life: 25, offset: 0 }); }
function triggerAction(key) { window.dispatchEvent(new KeyboardEvent('keydown', { key: key })); }

// --- CONTROLLER HANDLERS LISTENER AGENTS ---
window.addEventListener('keydown', (e) => {
    if (playerState.hp <= 0 || isResting) return;

    let actionTaken = false;
    let dx = 0, dy = 0;

    if (e.key === 'r' || e.key === 'R') {
        if (playerState.hp === playerState.maxHp && playerState.mp === playerState.maxMp) {
            appendLog("Already at full resources.");
        } else {
            appendLog("Setting down camp to recover...");
            isResting = true;
            restInterval = setInterval(handleRestTick, 200);
        }
        return;
    }
    else if (e.key === 'rest' || e.key === ' ') {
        actionTaken = true;
        appendLog("You waitingly stand ground.");
    }
    else if (e.key === 'f' || e.key === 'F') {
        if (playerState.mp >= 3) {
            playerState.mp -= 3;
            appendLog("Unleashed an outward Mana Blast energy shockwave!", "log-success");
            enemies.forEach(en => {
                if (Math.abs(en.x - playerPos.x) <= 1 && Math.abs(en.y - playerPos.y) <= 1) {
                    en.hp -= 6;
                    spawnText(en.x, en.y, "-6 Magic", "#38bdf8");
                }
            });
            enemies = enemies.filter(en => {
                if (en.hp <= 0) { playerState.xp += 5; appendLog(`Defeated ${en.name}!`); return false; }
                return true;
            });
            actionTaken = true;
        } else { appendLog("Insufficient Mana pools!"); }
    }
    else if (e.key === 'stairs' || e.key === 'Enter') {
        if (gameMap[playerPos.y][playerPos.x] === TILE.STAIRS_DOWN) {
            playerState.dungeonFloor++;
            appendLog(`Descended deeper into the crypts. Welcome to Floor ${playerState.dungeonFloor}!`, "log-success");
            generateProceduralDungeon();
            return;
        } else {
            appendLog("There are no stairs beneath your current position.");
        }
    }
    else {
        if (e.key === 'ArrowUp' || e.key === 'w') dy = -1;
        if (e.key === 'ArrowDown' || e.key === 's') dy = 1;
        if (e.key === 'ArrowLeft' || e.key === 'a') dx = -1;
        if (e.key === 'ArrowRight' || e.key === 'd') dx = 1;

        if (dx !== 0 || dy !== 0) {
            let tx = playerPos.x + dx; let ty = playerPos.y + dy;
            let destTile = gameMap[ty] ? gameMap[ty][tx] : TILE.WALL;
            let enemyTarget = enemies.find(en => en.x === tx && en.y === ty);

            if (enemyTarget) {
                let weaponDmg = 5 + Math.floor(playerState.stats.str / 3);
                enemyTarget.hp -= weaponDmg;
                appendLog(`You hit the ${enemyTarget.name} for ${weaponDmg} damage.`);
                spawnText(enemyTarget.x, enemyTarget.y, `-${weaponDmg}`, '#ffffff');

                if (enemyTarget.hp <= 0) {
                    enemies = enemies.filter(en => en !== enemyTarget);
                    playerState.xp += 5;
                    appendLog("Target vanquished!", "log-success");
                }
                actionTaken = true;
            } else if (destTile === TILE.FLOOR || destTile === TILE.STAIRS_DOWN) {
                playerPos = { x: tx, y: ty };
                actionTaken = true;
            }
        }
    }

    if (actionTaken) processTurn();
});

// --- ADVANCED PROPORTIONAL VECTOR GRAPHIC GRAPHICS ---
const cvs = document.getElementById('gameCanvas'); const ctx = cvs.getContext('2d');

function renderEngine() {
    // Clear whole frame completely to prevent camera bleeding ghosting lines
    ctx.fillStyle = "#020617"; ctx.fillRect(0, 0, cvs.width, cvs.height);

    for (let y = camY; y < camY + VIEW_HEIGHT; y++) {
        for (let x = camX; x < camX + VIEW_WIDTH; x++) {
            let sX = (x - camX) * GAME_TILE; let sY = (y - camY) * GAME_TILE;

            if (gameMap[y] && gameMap[y][x] === TILE.FLOOR) {
                // Fixed: Now covers 32x32 size correctly to seal floor seams cleanly
                ctx.fillStyle = "#1e293b"; ctx.fillRect(sX, sY, 32, 32);
                ctx.fillStyle = "#334155"; ctx.fillRect(sX + 2, sY + 2, 4, 4); 
            } 
            else if (gameMap[y] && gameMap[y][x] === TILE.STAIRS_DOWN) {
                ctx.fillStyle = "#1e293b"; ctx.fillRect(sX, sY, 32, 32);
                
                let gradient = ctx.createRadialGradient(sX+16, sY+16, 2, sX+16, sY+16, 12);
                gradient.addColorStop(0, '#38bdf8'); gradient.addColorStop(1, '#0369a1');
                ctx.fillStyle = gradient;
                
                ctx.fillRect(sX + 6, sY + 6, 20, 4);
                ctx.fillRect(sX + 9, sY + 12, 14, 4);
                ctx.fillRect(sX + 12, sY + 18, 8, 4);
            } 
            else {
                ctx.fillStyle = "#0f172a"; ctx.fillRect(sX, sY, 32, 32);
                ctx.strokeStyle = "#1e293b"; ctx.lineWidth = 1; ctx.strokeRect(sX, sY, 32, 32);
            }
        }
    }

    enemies.forEach(en => {
        let sX = (en.x - camX) * GAME_TILE; let sY = (en.y - camY) * GAME_TILE;
        ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.beginPath(); ctx.arc(sX+16, sY+22, 8, 0, Math.PI*2); ctx.fill();
        
        let rad = ctx.createRadialGradient(sX+16, sY+14, 2, sX+16, sY+14, 10);
        rad.addColorStop(0, '#f43f5e'); rad.addColorStop(1, '#9f1239');
        ctx.fillStyle = rad; ctx.beginPath(); ctx.arc(sX+16, sY+14, 9, 0, Math.PI*2); ctx.fill();
        
        ctx.fillStyle = "#ffe4e6"; ctx.fillRect(sX+13, sY+11, 2, 2); ctx.fillRect(sX+17, sY+11, 2, 2);
    });

    if (playerState.hp > 0) {
        let pX = (playerPos.x - camX) * GAME_TILE; let pY = (playerPos.y - camY) * GAME_TILE;
        ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.beginPath(); ctx.arc(pX+16, pY+24, 10, 0, Math.PI*2); ctx.fill();

        let pGrad = ctx.createRadialGradient(pX+16, pY+14, 3, pX+16, pY+14, 12);
        pGrad.addColorStop(0, '#38bdf8'); pGrad.addColorStop(1, '#1d4ed8');
        ctx.fillStyle = pGrad; ctx.beginPath(); ctx.arc(pX+16, pY+14, 11, 0, Math.PI*2); ctx.fill();

        ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(pX+16, pY+11, 3, 0, Math.PI*2); ctx.fill();
    }

    for (let i = floatTexts.length - 1; i >= 0; i--) {
        let ft = floatTexts[i];
        let sX = (ft.x - camX) * GAME_TILE; let sY = (ft.y - camY) * GAME_TILE;
        if (sX >= 0 && sX < cvs.width && sY >= 0 && sY < cvs.height) {
            ctx.fillStyle = ft.color; ctx.font = "bold 11px 'Segoe UI'";
            ctx.shadowColor = "black"; ctx.shadowBlur = 4;
            ctx.fillText(ft.text, sX + 2, sY - ft.offset);
            ctx.shadowBlur = 0; 
        }
        ft.offset += 0.8; ft.life--; if (ft.life <= 0) floatTexts.splice(i, 1);
    }

    requestAnimationFrame(renderEngine);
}

// Fixed Lifecycle Hook: Initiates setup safely only after the elements load inside document memory space
window.onload = function() {
    generateProceduralDungeon();
    requestAnimationFrame(renderEngine);
};
</script>
</body>
</html>

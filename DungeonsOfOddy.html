<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archon's Descent Roguelike</title>
    <style>
        body {
            background-color: #030712;
            color: #f3f4f6;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            padding: 20px;
            margin: 0;
            user-select: none;
        }
        #game-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        canvas {
            border: 4px solid #374151;
            background-color: #000000;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.7);
        }
        #ui-layout {
            display: flex;
            gap: 20px;
            width: 900px;
        }
        .panel {
            background-color: #111827;
            border: 2px solid #4b5563;
            padding: 15px;
            border-radius: 4px;
            box-sizing: border-box;
        }
        #sidebar {
            width: 320px;
            min-height: 480px;
        }
        #log-panel {
            width: 560px;
            height: 120px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.4;
        }
        h3, h4 {
            margin-top: 0;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #4b5563;
            padding-bottom: 5px;
        }
        .danger { color: #ef4444; font-weight: bold; }
        .bonus { color: #10b981; font-weight: bold; }
        .magic { color: #60a5fa; font-weight: bold; }
        .warning { color: #f97316; font-weight: bold; }
        .common { color: #9ca3af; }
    </style>
</head>
<body>

<div id="ui-layout">
    <div id="game-container">
        <!-- 16 Columns x 12 Rows viewable lens window -->
        <canvas id="gameCanvas" width="512" height="384"></canvas>
        <div id="log-panel" class="panel">
            <div id="log">Welcome, Hero. Descend the depths, search for traps, use magic, and claim the Amulet on Floor 15. Move with WASD/Arrows.</div>
        </div>
    </div>
    <div id="sidebar" class="panel">
        <!-- Populated via Javascript updateUI() -->
    </div>
</div>

<script>
// ============================================================================
// 1. CONSTANTS & ENUMS
// ============================================================================
const GAME_TILE = 32;
const VIEW_WIDTH = 16;
const VIEW_HEIGHT = 12;

const MAP_WIDTH = 50;
const MAP_HEIGHT = 50;
const TORCH_RADIUS = 5.5;

const TILE = {
    WALL: 0,
    FLOOR: 1,
    STAIRS_UP: 2,
    STAIRS_DOWN: 3,
    CHEST_CLOSED: 4,
    CHEST_OPEN: 5,
    TRAP: 6
};

const BIOMES = {
    CAVE:   { name: "Damp Caverns", wall: "#1e293b", floor: "#0f172a", wallText: "#475569", floorText: "#1e293b" },
    CRYPT:  { name: "Forgotten Crypt", wall: "#27272a", floor: "#18181b", wallText: "#52525b", floorText: "#27272a" },
    MAGMA:  { name: "Magma Core", wall: "#451a03", floor: "#1c1917", wallText: "#78350f", floorText: "#451a03" }
};

// ============================================================================
// 2. STATE VARIABLES
// ============================================================================
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");

let gameState = "PLAYING"; // PLAYING, DEAD, WIN
let gameMap = [];
let fovMap = [];
let exploredMap = [];
let revealedTraps = []; // Coordinate system strings tracking known hazard coordinates "x,y"

let playerPos = { x: 0, y: 0 };
let camX = 0;
let camY = 0;

let enemies = [];
let groundItems = [];
let floatingTexts = [];

let playerState = {
    hp: 40, maxHp: 40,
    mp: 20, maxMp: 20,
    stats: { str: 12, dex: 10, wis: 12 },
    lightDuration: 0,
    dungeonFloor: 1,
    hasBossKey: false,
    equipment: {
        weapon: { name: "Rusty Dagger", dmg: 2, type: "WEAPON" },
        armor: { name: "Cloth Rags", def: 0, type: "ARMOR" }
    },
    inventory: [
        { type: "POTION_HP", name: "Minor Health Potion", desc: "Heals 15 HP" },
        { type: "POTION_MP", name: "Minor Mana Potion", desc: "Restores 10 MP" }
    ],
    inventoryOpen: false
};

// ============================================================================
// 3. HELPER UTILITIES
// ============================================================================
function getCurrentBiome() {
    let f = playerState.dungeonFloor;
    if (f <= 5) return BIOMES.CAVE;
    if (f <= 10) return BIOMES.CRYPT;
    return BIOMES.MAGMA;
}

function spawnText(x, y, text, color) {
    floatingTexts.push({ x: x, y: y, text: text, color: color, timer: 30 });
}

function generateRandomItem(floor) {
    const roll = Math.random();
    if (roll < 0.45) {
        return Math.random() > 0.5 
            ? { type: "POTION_HP", name: "Health Potion", desc: "Heals 15 HP" }
            : { type: "POTION_MP", name: "Mana Potion", desc: "Restores 10 MP" };
    } else if (roll < 0.75) {
        const weaponTypes = ["Shortsword", "Mace", "Waraxe", "Longsword"];
        const w = weaponTypes[Math.floor(Math.random() * weaponTypes.length)];
        const damageBonus = Math.floor(floor / 3) + 3;
        return { type: "WEAPON", name: `+${damageBonus} ${w}`, dmg: damageBonus, desc: `Weapon Mod (+${damageBonus} DMG)` };
    } else {
        const armorTypes = ["Leather Armor", "Chainshirt", "Scale Mail", "Plate Armor"];
        const a = armorTypes[Math.min(Math.floor(Math.random() * armorTypes.length), Math.floor(floor / 3))];
        const defenseBonus = Math.floor(floor / 4) + 1;
        return { type: "ARMOR", name: a, def: defenseBonus, desc: `Armor Shielding (+${defenseBonus} DEF)` };
    }
}

// ============================================================================
// 4. FIELD OF VIEW ENGINE (RAY-CASTING)
// ============================================================================
function recalculateFOV() {
    for (let y = 0; y < MAP_HEIGHT; y++) {
        for (let x = 0; x < MAP_WIDTH; x++) { fovMap[y][x] = false; }
    }

    const currentRadius = playerState.lightDuration > 0 ? 9.5 : TORCH_RADIUS;
    const numRays = 140;

    for (let i = 0; i < numRays; i++) {
        let angle = (i / numRays) * Math.PI * 2;
        let dx = Math.cos(angle);
        let dy = Math.sin(angle);

        let cx = playerPos.x + 0.5;
        let cy = playerPos.y + 0.5;

        for (let r = 0; r < currentRadius; r += 0.3) {
            let tx = Math.floor(cx);
            let ty = Math.floor(cy);

            if (tx >= 0 && tx < MAP_WIDTH && ty >= 0 && ty < MAP_HEIGHT) {
                fovMap[ty][tx] = true;
                exploredMap[ty][tx] = true;
                if (gameMap[ty][tx] === TILE.WALL) break;
            } else { break; }
            cx += dx * 0.3;
            cy += dy * 0.3;
        }
    }
}

// ============================================================================
// 5. PROCEDURAL MAP GENERATION
// ============================================================================
function generateMap() {
    gameMap = []; enemies = []; groundItems = []; revealedTraps = [];
    
    // Allocate full grid map
    for (let y = 0; y < MAP_HEIGHT; y++) {
        let row = [], fovRow = [], expRow = [];
        for (let x = 0; x < MAP_WIDTH; x++) {
            row.push(TILE.WALL); fovRow.push(false); expRow.push(false);
        }
        gameMap.push(row); fovMap.push(fovRow); exploredMap.push(expRow);
    }

    let rooms = [];
    const minSize = 5, maxSize = 10, maxRooms = 12;

    for (let i = 0; i < maxRooms; i++) {
        let w = Math.floor(Math.random() * (maxSize - minSize)) + minSize;
        let h = Math.floor(Math.random() * (maxSize - minSize)) + minSize;
        let x = Math.floor(Math.random() * (MAP_WIDTH - w - 2)) + 1;
        let y = Math.floor(Math.random() * (MAP_HEIGHT - h - 2)) + 1;

        let overlap = false;
        for (let r of rooms) {
            if (x < r.x + r.w && x + w > r.x && y < r.y + r.h && y + h > r.y) { overlap = true; break; }
        }
        if (overlap) continue;

        // Carve room floorboards
        for (let rY = y; rY < y + h; rY++) {
            for (let rX = x; rX < x + w; rX++) { gameMap[rY][rX] = TILE.FLOOR; }
        }

        let cx = Math.floor(x + w / 2);
        let cy = Math.floor(y + h / 2);
        rooms.push({ x: x, y: y, w: w, h: h, cx: cx, cy: cy });

        if (rooms.length > 1) {
            let prev = rooms[rooms.length - 2];
            // Carve straight line corridors connecting centers
            let currX = prev.cx;
            while (currX !== cx) {
                gameMap[prev.cy][currX] = TILE.FLOOR;
                currX += cx > currX ? 1 : -1;
            }
            let currY = prev.cy;
            while (currY !== cy) {
                gameMap[currY][cx] = TILE.FLOOR;
                currY += cy > currY ? 1 : -1;
            }
        }
    }

    // Anchor player and exits
    let startRoom = rooms[0];
    let endRoom = rooms[rooms.length - 1];
    playerPos.x = startRoom.cx; playerPos.y = startRoom.cy;
    gameMap[playerPos.y][playerPos.x] = TILE.STAIRS_UP;
    gameMap[endRoom.cy][endRoom.cx] = TILE.STAIRS_DOWN;

    // Entity Distribution Loop
    for (let i = 1; i < rooms.length; i++) {
        let room = rooms[i];
        
        // Spawn standard objects/chests
        if (Math.random() < 0.4) {
            gameMap[room.y + 1][room.x + 1] = TILE.CHEST_CLOSED;
        }
        // Lay structural hidden environmental trap elements
        if (Math.random() < 0.5) {
            gameMap[room.cy][room.cx + 1] = TILE.TRAP;
        }

        // Spawn Level Monsters
        if (playerState.dungeonFloor === 10 && i === 1) {
            enemies.push({
                x: room.cx, y: room.cy, type: "BOSS", name: "The Bone Collector (BOSS)",
                hp: 75, maxHp: 75, dmg: 7, isBoss: true
            });
            playerState.hasBossKey = false;
        } else if (playerState.dungeonFloor !== 10) {
            let enemyRoll = Math.random();
            let name = "Dungeon Slime"; let hp = 10; let dmg = 3; let eType = "SLIME";
            
            if (playerState.dungeonFloor > 5 && enemyRoll > 0.5) {
                name = "Crypt Skeleton"; hp = 20; dmg = 5; eType = "SKELETON";
            }
            if (playerState.dungeonFloor > 10 && enemyRoll > 0.75) {
                name = "Hell Imp"; hp = 35; dmg = 8; eType = "IMP";
            }
            
            enemies.push({ x: room.cx, y: room.cy, type: eType, name: name, hp: hp, maxHp: hp, dmg: dmg });
        }
    }

    recalculateFOV();
    updateUI();
}

// ============================================================================
// 6. INPUT INTERACTION MECHANICS & TURNS
// ============================================================================
function performTrapSearch() {
    let found = false;
    let searchChance = 0.20 + (playerState.stats.wis * 0.05); // 12 WIS = 80% search success chance

    for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
            let tx = playerPos.x + dx; let ty = playerPos.y + dy;
            if (tx >= 0 && tx < MAP_WIDTH && ty >= 0 && ty < MAP_HEIGHT) {
                if (gameMap[ty][tx] === TILE.TRAP) {
                    let key = `${tx},${ty}`;
                    if (!revealedTraps.includes(key) && Math.random() <= searchChance) {
                        revealedTraps.push(key);
                        found = true;
                        spawnText(tx, ty, "⚠️ TRAP!", '#f97316');
                    }
                }
            }
        }
    }

    if (found) {
        document.getElementById('log').innerHTML = "🔍 <span class='bonus'>Your keen senses caught something! Hidden floor triggers are now exposed nearby.</span>";
    } else {
        document.getElementById('log').innerHTML = "<span class='common'>You check the dark corners... nothing unusual stands out.</span>";
    }

    processMonsterTurns();
    updateUI();
}

function castLightSpell() {
    const MANA_COST = 3;
    if (playerState.mp < MANA_COST) {
        document.getElementById('log').innerHTML = "❌ <span class='danger'>Not enough mana to project magical illumination!</span>";
        return;
    }
    playerState.mp -= MANA_COST;
    playerState.lightDuration = 35; // Lasts for 35 action movements

    recalculateFOV();
    spawnText(playerPos.x, playerPos.y, "✨ LIGHT", '#fde047');
    document.getElementById('log').innerHTML = "✨ <span class='magic'>You cast Light! A brilliant aura forces back the shadows.</span>";

    processMonsterTurns();
    updateUI();
}

function useInventoryItem(index) {
    let item = playerState.inventory[index];
    if (!item) return;

    if (item.type === "POTION_HP") {
        playerState.hp = Math.min(playerState.maxHp, playerState.hp + 20);
        document.getElementById('log').innerHTML = `🧪 <span class='bonus'>Drank ${item.name}. Restored 20 HP.</span>`;
        playerState.inventory.splice(index, 1);
    } else if (item.type === "POTION_MP") {
        playerState.mp = Math.min(playerState.maxMp, playerState.mp + 12);
        document.getElementById('log').innerHTML = `🧪 <span class='magic'>Drank ${item.name}. Restored 12 MP.</span>`;
        playerState.inventory.splice(index, 1);
    } else if (item.type === "WEAPON") {
        let old = playerState.equipment.weapon;
        playerState.equipment.weapon = item;
        playerState.inventory[index] = old;
        document.getElementById('log').innerHTML = `⚔️ Equipped ${item.name}.`;
    } else if (item.type === "ARMOR") {
        let old = playerState.equipment.armor;
        playerState.equipment.armor = item;
        playerState.inventory[index] = old;
        document.getElementById('log').innerHTML = `🛡️ Equipped ${item.name}.`;
    }

    processMonsterTurns();
    updateUI();
}

function handlePlayerMove(dx, dy) {
    if (gameState !== "PLAYING") return;
    
    let targetX = playerPos.x + dx;
    let targetY = playerPos.y + dy;

    if (targetX < 0 || targetX >= MAP_WIDTH || targetY < 0 || targetY >= MAP_HEIGHT) return;
    let tile = gameMap[targetY][targetX];

    // Combat Attack Resolution Step
    let enemy = enemies.find(en => en.x === targetX && en.y === targetY);
    if (enemy) {
        let dmg = Math.floor(playerState.stats.str / 2) + playerState.equipment.weapon.dmg;
        enemy.hp -= dmg;
        spawnText(enemy.x, enemy.y, `-${dmg}`, '#f3f4f6');
        document.getElementById('log').innerHTML = `⚔️ You strike ${enemy.name} for <span class='danger'>${dmg}</span> damage!`;

        if (enemy.hp <= 0) {
            enemies = enemies.filter(en => en !== enemy);
            document.getElementById('log').innerHTML += ` <span class='bonus'>You vanquished the ${enemy.name}!</span>`;
            
            if (enemy.isBoss) {
                playerState.hasBossKey = true;
            } else if (Math.random() < 0.4) {
                groundItems.push({ x: enemy.x, y: enemy.y, item: generateRandomItem(playerState.dungeonFloor) });
            }
        }
        processMonsterTurns();
        updateUI();
        return;
    }

    if (tile === TILE.WALL) return;

    if (tile === TILE.CHEST_CLOSED) {
        gameMap[targetY][targetX] = TILE.CHEST_OPEN;
        let reward = generateRandomItem(playerState.dungeonFloor);
        playerState.inventory.push(reward);
        document.getElementById('log').innerHTML = `🎁 <span class='bonus'>Opened chest and found: ${reward.name}! Pressed [I] to equip.</span>`;
        processMonsterTurns();
        updateUI();
        return;
    }

    // Step on active Trap
    if (tile === TILE.TRAP) {
        let def = playerState.equipment.armor.def;
        let trapDmg = Math.max(1, 6 - def);
        playerState.hp -= trapDmg;
        spawnText(targetX, targetY, `-${trapDmg}`, '#ef4444');
        gameMap[targetY][targetX] = TILE.FLOOR; // Breaks trap mechanism
        document.getElementById('log').innerHTML = `💥 <span class='danger'>Snap! You trigger a hidden blade trap and take ${trapDmg} damage!</span>`;
    }

    playerPos.x = targetX;
    playerPos.y = targetY;
    
    processMonsterTurns();
    recalculateFOV();
    updateUI();
}

function processMonsterTurns() {
    if (playerState.lightDuration > 0) {
        playerState.lightDuration--;
        if (playerState.lightDuration === 0) {
            document.getElementById('log').innerHTML += " <span class='warning'>(Your magical Light spell flickers and fades...)</span>";
        }
    }

    enemies.forEach(en => {
        let dist = Math.hypot(playerPos.x - en.x, playerPos.y - en.y);
        // Chase if within perceived detection distance and in view layout
        if (dist <= 6 && fovMap[en.y][en.x]) {
            if (dist < 1.5) {
                let damage = Math.max(1, en.dmg - playerState.equipment.armor.def);
                playerState.hp -= damage;
                spawnText(playerPos.x, playerPos.y, `-${damage}`, '#ef4444');
                document.getElementById('log').innerHTML += `<br>👹 <span class='danger'>${en.name} hits you for ${damage} damage!</span>`;
            } else {
                let stepX = en.x + Math.sign(playerPos.x - en.x);
                let stepY = en.y + Math.sign(playerPos.y - en.y);
                
                // Obstacle wall block checking
                if (gameMap[stepY][stepX] !== TILE.WALL && !enemies.some(e => e.x === stepX && e.y === stepY)) {
                    en.x = stepX; en.y = stepY;
                }
            }
        }
    });

    if (playerState.hp <= 0) {
        gameState = "DEAD";
        document.getElementById('log').innerHTML = "💀 <span class='danger'>YOU HAVE DIED. Refresh browser tab to crawl again.</span>";
    }
}

// ============================================================================
// 7. KEYBOARD ROUTING EVENT LISTENERS
// ============================================================================
window.addEventListener('keydown', (e) => {
    if (gameState !== "PLAYING") return;

    if (playerState.inventoryOpen) {
        if (e.key === 'i' || e.key === 'I' || e.key === 'Escape') {
            playerState.inventoryOpen = false; updateUI();
        } else if (e.key >= '1' && e.key <= '9') {
            let index = parseInt(e.key) - 1;
            if (index < playerState.inventory.length) useInventoryItem(index);
        }
        return;
    }

    switch(e.key) {
        case 'w': case 'ArrowUp':    handlePlayerMove(0, -1); break;
        case 's': case 'ArrowDown':  handlePlayerMove(0, 1); break;
        case 'a': case 'ArrowLeft':  handlePlayerMove(-1, 0); break;
        case 'd': case 'ArrowRight': handlePlayerMove(1, 0); break;
        case 'f': case 'F':          performTrapSearch(); break;
        case 'l': case 'L':          castLightSpell(); break;
        case 'i': case 'I':          playerState.inventoryOpen = true; updateUI(); break;
        case 'Enter':
            if (gameMap[playerPos.y][playerPos.x] === TILE.STAIRS_DOWN) {
                if (playerState.dungeonFloor === 15) {
                    gameState = "WIN";
                    document.getElementById('log').innerHTML = "🏆 <span class='bonus'>YOU COLLECT THE ARCHON AMULET! You safely escape back to the surface victorious!</span>";
                } else if (playerState.dungeonFloor === 10 && !playerState.hasBossKey) {
                    document.getElementById('log').innerHTML = "❌ <span class='danger'>The depth stairs are completely locked down. Slay the Gatekeeper for its Key!</span>";
                } else {
                    playerState.dungeonFloor++;
                    generateMap();
                    document.getElementById('log').innerHTML = `Descended into Floor ${playerState.dungeonFloor}. Stay alert.`;
                }
                updateUI();
            }
            break;
    }
});

// ============================================================================
// 8. GRAPHICS RENDERING LOOPS
// ============================================================================
function updateUI() {
    let biome = getCurrentBiome();
    let lightIndicator = playerState.lightDuration > 0 ? `<b style="color:#fde047">✨ LIT (${playerState.lightDuration})</b>` : `<span class="common">Dim Torch</span>`;
    
    let html = `<h3>${biome.name}</h3>`;
    html += `<p><b>DEPTH:</b> Floor ${playerState.dungeonFloor}/15</p>`;
    html += `<p><b>HP:</b> ${playerState.hp}/${playerState.maxHp} | <b>MP:</b> ${playerState.mp}/${playerState.maxMp}</p>`;
    html += `<p><b>LIGHT:</b> ${lightIndicator}</p>`;
    html += `<hr>`;
    html += `<h4>EQUIPMENT</h4>`;
    html += `<p>⚔️ <b>WEAPON:</b> ${playerState.equipment.weapon.name} (+${playerState.equipment.weapon.dmg} DMG)</p>`;
    html += `<p>🛡️ <b>ARMOR:</b> ${playerState.equipment.armor.name} (+${playerState.equipment.armor.def} DEF)</p>`;
    
    if (playerState.hasBossKey) {
        html += `<p style="color:#fde047; font-weight:bold;">🗝️ KEY COLLECTED</p>`;
    }

    if (playerState.inventoryOpen) {
        html += `<hr><h4 style="color:#60a5fa">--- PACK INVENTORY ---</h4><p style="font-size:11px;">Press index keys [1-9] to use/equip:</p>`;
        playerState.inventory.forEach((item, idx) => {
            html += `<p><b>[${idx + 1}]</b> ${item.name} <br><small class="common">(${item.desc})</small></p>`;
        });
        if (playerState.inventory.length === 0) html += `<p><i>Your inventory is completely empty.</i></p>`;
    } else {
        html += `<hr><p style="color:#9ca3af; font-size:12px; line-height: 1.5;">`;
        html += `<b>[WASD / Arrows]</b> Move & Strike<br>`;
        html += `<b>[F]</b> Search Adjacent Traps<br>`;
        html += `<b>[L]</b> Cast Light Spell (3 MP)<br>`;
        html += `<b>[I]</b> Open Equipment/Inventory Pack<br>`;
        html += `<b>[Enter]</b> Descend Stairwell Case</p>`;
    }

    document.getElementById('sidebar').innerHTML = html;
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Center layout camera track framing
    camX = playerPos.x - Math.floor(VIEW_WIDTH / 2);
    camY = playerPos.y - Math.floor(VIEW_HEIGHT / 2);
    camX = Math.max(0, Math.min(camX, MAP_WIDTH - VIEW_WIDTH));
    camY = Math.max(0, Math.min(camY, MAP_HEIGHT - VIEW_HEIGHT));

    let biome = getCurrentBiome();

    // Loop through viewport rows and columns
    for (let vy = 0; vy < VIEW_HEIGHT; vy++) {
        for (let vx = 0; vx < VIEW_WIDTH; vx++) {
            let mx = camX + vx;
            let my = camY + vy;

            let scrX = vx * GAME_TILE;
            let scrY = vy * GAME_TILE;

            if (!exploredMap[my][mx]) {
                ctx.fillStyle = "#000000";
                ctx.fillRect(scrX, scrY, GAME_TILE, GAME_TILE);
                continue;
            }

            let tile = gameMap[my][mx];

            // Render Map base layouts
            if (tile === TILE.WALL) {
                ctx.fillStyle = biome.wall; ctx.fillRect(scrX, scrY, GAME_TILE, GAME_TILE);
                ctx.fillStyle = biome.wallText; ctx.font = "14px Courier"; ctx.fillText("#", scrX + 11, scrY + 20);
            } else {
                ctx.fillStyle = biome.floor; ctx.fillRect(scrX, scrY, GAME_TILE, GAME_TILE);
                
                if (tile === TILE.STAIRS_UP) {
                    ctx.fillStyle = "#60a5fa"; ctx.font = "bold 16px Courier"; ctx.fillText("<", scrX + 10, scrY + 22);
                } else if (tile === TILE.STAIRS_DOWN) {
                    ctx.fillStyle = playerState.dungeonFloor === 15 ? "#fde047" : "#ef4444";
                    ctx.font = "bold 16px Courier"; ctx.fillText(playerState.dungeonFloor === 15 ? "A" : ">", scrX + 10, scrY + 22);
                } else if (tile === TILE.CHEST_CLOSED) {
                    ctx.fillStyle = "#b45309"; ctx.fillRect(scrX + 6, scrY + 8, 20, 18);
                    ctx.fillStyle = "#fde047"; ctx.fillRect(scrX + 14, scrY + 14, 4, 4);
                } else if (tile === TILE.CHEST_OPEN) {
                    ctx.fillStyle = "#78350f"; ctx.fillRect(scrX + 6, scrY + 12, 20, 14);
                } else if (tile === TILE.TRAP) {
                    // Check if it's explicitly found via Search action
                    if (revealedTraps.includes(`${mx},${my}`)) {
                        ctx.fillStyle = "#7c2d12"; ctx.fillRect(scrX, scrY, GAME_TILE, GAME_TILE);
                        ctx.fillStyle = "#ef4444"; ctx.font = "bold 14px Courier"; ctx.fillText("^", scrX + 12, scrY + 22);
                    } else {
                        // Otherwise looks like standard biome floor background
                        ctx.fillStyle = biome.floor; ctx.fillRect(scrX, scrY, GAME_TILE, GAME_TILE);
                    }
                }
            }

            // Lay dimmed shroud layer if out of active field of vision raycast sight lines
            if (!fovMap[my][mx]) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.72)";
                ctx.fillRect(scrX, scrY, GAME_TILE, GAME_TILE);
            }
        }
    }

    // Render Enemies inside viewport vision
    enemies.forEach(en => {
        if (!fovMap[en.y][en.x]) return;
        let sX = en.x - camX; let sY = en.y - camY;
        if (sX >= 0 && sX < VIEW_WIDTH && sY >= 0 && sY < VIEW_HEIGHT) {
            let pxX = sX * GAME_TILE; let pxY = sY * GAME_TILE;
            
            ctx.fillStyle = en.isBoss ? "#f43f5e" : "#a855f7";
            ctx.font = "bold 18px Courier";
            ctx.fillText(en.isBoss ? "B" : en.type[0], pxX + 10, pxY + 22);

            // Simple micro monster healthbar overlay indicators
            ctx.fillStyle = "black"; ctx.fillRect(pxX + 2, pxY + 2, 28, 4);
            ctx.fillStyle = "#ef4444"; ctx.fillRect(pxX + 2, pxY + 2, (en.hp / en.maxHp) * 28, 4);
        }
    });

    // Render Hero avatar tracking position
    let pScrX = (playerPos.x - camX) * GAME_TILE;
    let pScrY = (playerPos.y - camY) * GAME_TILE;
    ctx.fillStyle = "#fde047"; ctx.font = "bold 20px Courier";
    ctx.fillText("@", pScrX + 10, pScrY + 22);

    // Floating text render handling
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        let ft = floatingTexts[i];
        let fx = (ft.x - camX) * GAME_TILE + 8;
        let fy = (ft.y - camY) * GAME_TILE - (30 - ft.timer) * 0.4;
        ctx.fillStyle = ft.color; ctx.font = "bold 12px Courier";
        ctx.fillText(ft.text, fx, fy);
        ft.timer--;
        if (ft.timer <= 0) floatingTexts.splice(i, 1);
    }

    requestAnimationFrame(gameLoop);
}

// ============================================================================
// 9. ENGINE INITIALIZATION BOOTSTRAPPING
// ============================================================================
generateMap();
requestAnimationFrame(gameLoop);
</script>

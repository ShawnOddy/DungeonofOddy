<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Engine</title>
    <style>
        body {
            background-color: #1e1e2f;
            color: #c8c8d0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #ffffff; }
        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .panel {
            background-color: #2a2a3b;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #3b3b4f;
        }
        canvas {
            background-color: #000;
            image-rendering: pixelated; 
        }
        #studioCanvas {
            flex-shrink: 0;
            object-fit: contain;
            cursor: crosshair;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            max-width: 416px;
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }
        button:hover { background-color: #2563eb; }
        button.active { background-color: #10b981; }
        #log {
            margin-top: 20px;
            color: #10b981;
        }
    </style>
</head>
<body>

    <h1>Dungeon Engine</h1>

    <div class="container">
        <div class="panel">
            <h3>Game View</h3>
            <canvas id="gameCanvas" width="800" height="576"></canvas>
        </div>

        <div class="panel">
            <h3>Alignment Studio</h3>
            <img id="sourceImage" src="image_9ef1c2.jpg" style="display:none;" alt="Sprite Sheet">
            <canvas id="studioCanvas" width="416" height="352"></canvas>
            
            <div class="controls" id="mapper-controls">
                <button onclick="setTarget('WALL', this)">Map Wall</button>
                <button onclick="setTarget('WALL_TORCH', this)">🔥 Map Torch Wall</button>
                <button onclick="setTarget('WALL_MOSS', this)">🌿 Map Mossy Wall</button>
                <button onclick="setTarget('FLOOR', this)">Map Floor</button>
                <button onclick="setTarget('FLOOR_CRACKED', this)">🕸️ Map Cracked Floor</button>
                <button onclick="setTarget('PLAYER', this)">Map Player</button>
                <button onclick="setTarget('GOBLIN', this)">Map Goblin</button>
                <button onclick="setTarget('CHEST', this)">Map Chest</button>
            </div>
            <div id="log">Awaiting input...</div>
        </div>
    </div>

<script>
// --- 1. CONSTANTS & DICTIONARIES ---
const SHEET_GRID = 16;   // Physical size of a square on the source image
const GAME_TILE = 32;    // The rendered size in the game window
const MAP_WIDTH = 25;
const MAP_HEIGHT = 18;

const TILE = { 
    WALL: 0, FLOOR: 1, 
    WALL_TORCH: 2, WALL_MOSS: 3, FLOOR_CRACKED: 4 
};

// Default mapping (w and h dictate how many 16px squares the sprite uses)
let SPRITE_MAP = {
    WALL:          { col: 0, row: 0, w: 1, h: 1 }, 
    WALL_TORCH:    { col: 0, row: 0, w: 1, h: 1 }, 
    WALL_MOSS:     { col: 0, row: 0, w: 1, h: 1 }, 
    FLOOR:         { col: 1, row: 0, w: 1, h: 1 }, 
    FLOOR_CRACKED: { col: 1, row: 0, w: 1, h: 1 }, 
    PLAYER:        { col: 0, row: 1, w: 2, h: 2 }, 
    GOBLIN:        { col: 2, row: 1, w: 2, h: 2 },
    CHEST:         { col: 4, row: 1, w: 2, h: 2 }
};

let gameMap = [];
let currentMappingTarget = null;
let activeBtn = null;

// --- 2. CANVAS SETUP ---
const gCanvas = document.getElementById('gameCanvas');
const gCtx = gCanvas.getContext('2d');

const sCanvas = document.getElementById('studioCanvas');
const sCtx = sCanvas.getContext('2d');

const spriteSheet = document.getElementById('sourceImage');

// --- 3. INITIALIZATION ---
spriteSheet.onload = () => {
    // Crucial for pixel art: Disable blurring
    gCtx.imageSmoothingEnabled = false;
    sCtx.imageSmoothingEnabled = false;

    // Use naturalWidth to fix hidden image bug
    if (spriteSheet.naturalWidth > 0) {
        sCanvas.width = spriteSheet.naturalWidth;
        sCanvas.height = spriteSheet.naturalHeight;
    } else {
        sCanvas.width = 416;
        sCanvas.height = 352;
    }

    generateMap();
    renderStudioGrid();
    drawScene();
};

if (spriteSheet.complete) spriteSheet.onload();

// Utility function for random numbers
function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

// --- 4. ENGINE FUNCTIONS ---
function generateMap() {
    gameMap = [];
    
    // Basic Walled Room
    for (let y = 0; y < MAP_HEIGHT; y++) {
        let row = [];
        for (let x = 0; x < MAP_WIDTH; x++) {
            if (x === 0 || x === MAP_WIDTH - 1 || y === 0 || y === MAP_HEIGHT - 1) {
                row.push(TILE.WALL);
            } else {
                row.push(TILE.FLOOR);
            }
        }
        gameMap.push(row);
    }

    // --- DECORATOR PASS ---
    for (let y = 1; y < MAP_HEIGHT - 1; y++) {
        for (let x = 1; x < MAP_WIDTH - 1; x++) {
            
            // Decorate Inner Walls (pretend we added internal walls)
            if (gameMap[y][x] === TILE.WALL) {
                let rand = randInt(1, 100);
                if (rand <= 10) gameMap[y][x] = TILE.WALL_TORCH;
                else if (rand <= 25) gameMap[y][x] = TILE.WALL_MOSS;
            }
            
            // Decorate Top Perimeter Walls
            if (y === 0 && gameMap[y][x] === TILE.WALL) {
                let rand = randInt(1, 100);
                if (rand <= 15) gameMap[y][x] = TILE.WALL_TORCH;
            }
            
            // Decorate Floors
            if (gameMap[y][x] === TILE.FLOOR) {
                let rand = randInt(1, 100);
                if (rand <= 8) gameMap[y][x] = TILE.FLOOR_CRACKED; 
            }
        }
    }
}

// The core rendering logic
function drawSprite(key, gridX, gridY) {
    const spr = SPRITE_MAP[key];
    if (!spr) return;
    
    const sourceWidth = spr.w * SHEET_GRID;
    const sourceHeight = spr.h * SHEET_GRID;
    
    gCtx.drawImage(
        spriteSheet, 
        spr.col * SHEET_GRID, 
        spr.row * SHEET_GRID, 
        sourceWidth,          
        sourceHeight,         
        gridX * GAME_TILE,    
        gridY * GAME_TILE,    
        GAME_TILE,            
        GAME_TILE             
    );
}

function drawScene() {
    gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);

    // Draw the map
    for (let y = 0; y < MAP_HEIGHT; y++) {
        for (let x = 0; x < MAP_WIDTH; x++) {
            let tileType = gameMap[y][x];
            
            // Draw floor under variants to avoid black transparency gaps
            if (tileType !== TILE.WALL && tileType !== TILE.WALL_TORCH && tileType !== TILE.WALL_MOSS) {
                drawSprite('FLOOR', x, y);
            }
            
            if (tileType === TILE.FLOOR) drawSprite('FLOOR', x, y);
            if (tileType === TILE.FLOOR_CRACKED) drawSprite('FLOOR_CRACKED', x, y);
            if (tileType === TILE.WALL) drawSprite('WALL', x, y);
            if (tileType === TILE.WALL_TORCH) drawSprite('WALL_TORCH', x, y);
            if (tileType === TILE.WALL_MOSS) drawSprite('WALL_MOSS', x, y);
        }
    }

    // Draw dummy entities
    drawSprite('CHEST', 12, 5);
    drawSprite('GOBLIN', 15, 8);
    drawSprite('PLAYER', 12, 9); 
}

// --- 5. ALIGNMENT STUDIO LOGIC ---
function setTarget(key, btn) {
    currentMappingTarget = key;
    if (activeBtn) activeBtn.classList.remove('active');
    btn.classList.add('active');
    activeBtn = btn;
    document.getElementById('log').innerText = `Click on the grid to map: ${key}`;
}

sCanvas.addEventListener('click', (e) => {
    if (!currentMappingTarget) {
        alert("Please select a target button first!");
        return;
    }
    
    const rect = sCanvas.getBoundingClientRect();
    const col = Math.floor((e.clientX - rect.left) / SHEET_GRID);
    const row = Math.floor((e.clientY - rect.top) / SHEET_GRID);
    
    // Safety check for existing width and height
    const existingW = SPRITE_MAP[currentMappingTarget] ? SPRITE_MAP[currentMappingTarget].w : 1;
    const existingH = SPRITE_MAP[currentMappingTarget] ? SPRITE_MAP[currentMappingTarget].h : 1;

    SPRITE_MAP[currentMappingTarget] = { col, row, w: existingW, h: existingH };
    document.getElementById('log').innerText = `✅ Mapped [${currentMappingTarget}] to Col: ${col}, Row: ${row}`;
    
    renderStudioGrid(); 
    drawScene(); 
});

function renderStudioGrid() {
    sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
    sCtx.drawImage(spriteSheet, 0, 0);
    
    const cols = sCanvas.width / SHEET_GRID;
    const rows = sCanvas.height / SHEET_GRID;

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            sCtx.strokeStyle = "rgba(255, 255, 255, 0.2)";
            sCtx.strokeRect(c * SHEET_GRID, r * SHEET_GRID, SHEET_GRID, SHEET_GRID);
            
            for (let key in SPRITE_MAP) {
                let spr = SPRITE_MAP[key];
                if (spr && spr.col === c && spr.row === r) {
                    let w = (spr.w || 1) * SHEET_GRID;
                    let h = (spr.h || 1) * SHEET_GRID;
                    
                    sCtx.strokeStyle = "#3b82f6";
                    sCtx.lineWidth = 2;
                    sCtx.strokeRect(c * SHEET_GRID, r * SHEET_GRID, w, h);
                    
                    sCtx.lineWidth = 1;
                    sCtx.fillStyle = "rgba(59, 130, 246, 0.8)";
                    sCtx.fillRect(c * SHEET_GRID, r * SHEET_GRID, 18, 12);
                    sCtx.fillStyle = "#ffffff";
                    sCtx.font = "10px Arial";
                    sCtx.fillText(key.substring(0, 3), c * SHEET_GRID + 2, r * SHEET_GRID + 10);
                }
            }
        }
    }
}
</script>
</body>
</html>
